<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RJ5BENYEVR"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-RJ5BENYEVR');
    </script>
</head>

<body>
    <div class="weather-card">
        <h1>Weather App</h1>
        <div class="search">
            <input type="text" id="city" placeholder="Enter a city...">
            <button id="searchBtn">Search</button>
        </div>

        <div class="weather-info">
            <h2 id="cityName">City</h2>
            <p id="temperature">--°C</p>
            <p id="description">Weather description</p>

            <div class="details">
                <p id="humidity">Humidity: --%</p>
                <p id="wind">Wind: -- m/s</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    

</body>

</html>
